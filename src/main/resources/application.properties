spring.application.name=auth
# ============================================
# CONFIGURACION DE BASE DE DATOS (MySQL)
# ============================================
# Conexion a la base de datos
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME_AUTH}?useSSL=false&serverTimezone=America/Santiago&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ============================================
# Configuracion de Usuario admin
# ============================================
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}
# ============================================
# JPA (Hibernate) Configuration
# ============================================
# Mostrar SQL en consola (util para debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Generar esquema automaticamente
spring.jpa.hibernate.ddl-auto=update
# Dialecto de MySQL
#spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# ============================================
# LOGGING Configuration
# ============================================
# Nivel de logging para paquetes especificos
logging.level.com.evecta.auth=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
# Patron de logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# Archivo de log
logging.file.name=logs/auth-app.log
logging.file.path=logs/
# ============================================
# SPRING BOOT CONFIGURATION
# ============================================
# Context path de la aplicacion
server.port=${SERVER_PORT}
# Configuracion de Jackson (JSON)
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Santiago
# ============================================
# SECURITY Configuration (si usas Spring Security)
# ============================================
# Configuracion de BCrypt (fuerza de encriptacion)
spring.security.password.encoding.bcrypt.strength=${BCRYPT_STRENGTH}
# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS}
app.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS}
# Habilitar logs de acceso HTTP para ver quién hace las peticiones
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b "%{User-Agent}i"
# ============================================
# SWAGGER / OPENAPI CONFIGURATION
# ============================================
springdoc.api-docs.path=/v3/api-docs
# Deshabilitamos la UI interna ya que el API Gateway centralizará la visualización
springdoc.swagger-ui.enabled=false
gateway.public.url="http://${EC2_HOST:localhost:9000}"
# ============================================
# MAIL CONFIGURATION (SMTP)
# ============================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# URL interna para la comunicación directa por OpenFeign
core.service.url=${CORE_SERVICE_URL:http://core-sifa:8080}