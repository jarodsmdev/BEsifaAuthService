name: Build and Deploy Auth Service

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Doppler CLI
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      # Export secrets from Doppler
      - name: Export secrets from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler secrets download \
            --no-file \
            --format json | jq -r '
              to_entries[]
              | "\(.key)<<EOF\n\(.value)\nEOF"
            ' >> $GITHUB_ENV

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t jarodsm/sifa-auth:latest .

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push jarodsm/sifa-auth:latest

      # Generate runtime env file
      - name: Generate runtime env
        run: |
          cat > auth.env <<EOF
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}

          ADMIN_EMAIL=${ADMIN_EMAIL}
          ADMIN_PASSWORD=${ADMIN_PASSWORD}

          JWT_SECRET=${JWT_SECRET}
          JWT_EXPIRATION_SECONDS=${JWT_EXPIRATION_SECONDS}
          JWT_REFRESH_EXPIRATION_SECONDS=${JWT_REFRESH_EXPIRATION_SECONDS}

          BCRYPT_STRENGTH=${BCRYPT_STRENGTH}

          SPRING_MAIL_HOST=${SPRING_MAIL_HOST}
          SPRING_MAIL_PORT=${SPRING_MAIL_PORT}
          SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
          SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
          
          CORE_SERVICE_URL=${CORE_SERVICE_URL}
          EOF

      # Create temporary SSH key
      - name: Create SSH key
        run: |
          echo "${EC2_SSH_KEY}" > key.pem
          chmod 600 key.pem

      # Copy env file to private auth server through bastion
      - name: Copy env file to auth server
        run: |
          scp \
          -i key.pem \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ProxyCommand="ssh -i key.pem -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@${EC2_HOST}" \
          auth.env \
          ubuntu@${AUTH_PRIVATE_HOST}:/tmp/auth.env

      # Deploy remotely through bastion
      - name: Deploy Auth Service
        run: |
          ssh \
          -i key.pem \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ProxyCommand="ssh -i key.pem -W %h:%p -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@${EC2_HOST}" \
          ubuntu@${AUTH_PRIVATE_HOST} << 'EOF'
          
              set -e
          
              trap "rm -f /tmp/auth.env" EXIT
          
              echo "Pulling latest image..."
              docker pull jarodsm/sifa-auth:latest
          
              echo "Stopping old container..."
              docker rm -f sifa-auth || true
          
              echo "Starting new container..."
              docker run -d \
              --name sifa-auth \
              --restart unless-stopped \
              -p 80:8080 \
              --env-file /tmp/auth.env \
              -e SERVER_PORT=8080 \
              jarodsm/sifa-auth:latest
          
              echo "Deployment completed successfully."
          
          EOF

      # Cleanup local temporary files
      - name: Cleanup
        run: |
          rm -f key.pem
          rm -f auth.env